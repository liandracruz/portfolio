<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Jogo da memória</title>
</head>
<body>
    <main id="game-container">
        <div id="modal-overlay" class="active">

          <div id="level-screen" class="">
            <h1>Jogo da memória</h1>
            <p>Escolha o nível que deseja jogar</p>
            <!-- <p id="level-descreption"></p> -->
            <div id="btn-levels">
              <button id="easy-level">Fácil</button>
              <button id="medium-level">Médio</button>
              <button id="hard-level">Difícil</button>
            </div>
          </div>
      
          <div id="game-over-screen" class="hidden">
            <h1>Parabéns! &#129395;</h1>
            <p id="final-score-msg">Lorem ipsum dolor, sit amet consectetur adipisicing elit.</p>
            <div id="btn-game-over">
              <button id="btn-restart">Novo Jogo</button>
              <button id="btn-portfolio">Voltar ao portfolio</button>
            </div>
          </div>

        </div>
      
        <section id="game-area">
            <div class="score"></div>
            <div id="game-board"></div>
        </section>
      </main>
</body>
</html>
